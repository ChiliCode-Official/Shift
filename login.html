<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Terminal | Shift</title>
    
    <!-- Favicon / PWA Icon -->
    <link rel="icon" type="image/png" href="https://i.imgur.com/kLlDof4.png">
    
    <!-- Hojas de estilo -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px 32px;
            text-align: center;
            animation: card-reveal 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @media (max-width: 360px) {
            .login-card {
                padding: 24px 16px;
            }
            .login-title {
                font-size: 1.8rem;
            }
        }

        @keyframes card-reveal {
            from {
                opacity: 0;
                transform: translateY(20px);
                box-shadow: 0 0 0 0 rgba(0, 0, 0, 0);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            height: 60px;
            margin-bottom: 24px;
            object-fit: contain;
        }

        .login-title {
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #FFFFFF 40%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .error-message {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: left;
            display: none;
            padding: 8px 12px;
            background: rgba(255, 94, 94, 0.1);
            border: 1px solid rgba(255, 94, 94, 0.2);
            border-radius: 8px;
        }

        .demo-credentials {
            margin-top: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 0.8rem;
            text-align: left;
            color: var(--text-secondary);
        }

        .demo-title {
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
            font-family: var(--font-title);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .demo-item {
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .demo-item span {
            color: var(--text-primary);
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="glass-panel login-card">
        <img src="https://i.imgur.com/NQ2yinY.png" alt="Shift Logo" class="login-logo">
        <h1 class="login-title">Acceso Terminal</h1>
        <p class="login-subtitle">Introduce las credenciales de tu sucursal</p>

        <form id="login-form">
            <div class="form-group">
                <label for="sucursal-id" class="form-label">ID de Sucursal</label>
                <input type="text" id="sucursal-id" class="form-control" placeholder="Ej. SUC001" required autocomplete="off">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label for="sucursal-pin" class="form-label">PIN de Acceso</label>
                <input type="password" id="sucursal-pin" class="form-control" placeholder="••••" maxlength="6" inputmode="numeric" pattern="[0-9]*" required>
            </div>

            <button type="submit" id="btn-login-submit" class="btn btn-primary" style="width: 100%;">
                Verificar Credenciales
            </button>
            
            <div id="error-box" class="error-message"></div>
        </form>

        <div style="margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 16px; text-align: center;">
            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 12px;">¿Perdiste o no encuentras tus accesos?</p>
            <a href="https://wa.me/525574123521?text=Hola%20Chili%20Code,%20olvid%C3%A9%20mis%20accesos%20de%20Shift%20y%20necesito%20recuperarlos." target="_blank" class="btn btn-secondary" style="width: 100%; font-size: 0.85rem; min-height: 40px; gap: 8px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color: #25D366;">
                    <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.455L0 24zm6.59-4.846c1.6.95 3.488 1.449 5.421 1.45h.007c5.566 0 10.1-4.532 10.103-10.096.002-2.695-1.04-5.231-2.935-7.13C17.348 1.48 14.815.432 12.138.432c-5.562 0-10.1 4.532-10.103 10.096-.001 1.887.493 3.73 1.43 5.343l-.995 3.635 3.725-.978zm10.742-7.234c-.316-.157-1.872-.924-2.15-.1.026-.28-.27-.417-.395-.496l-.992-.484c-.2-.098-.31-.1-.454.125-.144.226-.556.7-.68 1.843-.125.144-.27.158-.49.043-.223-.114-.943-.347-1.797-1.112-.665-.593-1.113-1.324-1.243-1.547-.13-.223-.014-.344.099-.456.101-.101.222-.258.334-.387.114-.129.151-.222.227-.37.076-.15.038-.28-.019-.393-.056-.114-.556-1.342-.762-1.843-.207-.5-.436-.433-.596-.44-.15-.007-.323-.008-.495-.008-.173 0-.455.064-.693.32-.238.258-.91.888-.91 2.164 0 1.277.929 2.512 1.059 2.684.13.173 1.83 2.793 4.43 3.918.618.267 1.1.427 1.474.547.62.197 1.184.17 1.63.102.496-.075 1.872-.765 2.136-1.47.263-.703.263-1.306.184-1.433-.078-.127-.291-.2-.607-.357z"/>
                </svg>
                Solicitar Accesos por WhatsApp
            </a>
            <a href="index.html" style="display: inline-block; margin-top: 14px; font-size: 0.8rem; color: var(--text-secondary); text-decoration: none; transition: var(--transition-smooth);" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-secondary)'">
                ← Volver al inicio
            </a>
        </div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const sucursalId = document.getElementById('sucursal-id').value.trim();
            const pin = document.getElementById('sucursal-pin').value.trim();
            const errorBox = document.getElementById('error-box');
            const submitBtn = document.getElementById('btn-login-submit');
            
            errorBox.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Verificando...';

            try {
                const q = query(
                    collection(db, "usuarios"), 
                    where("sucursalId", "==", sucursalId), 
                    where("pin", "==", pin)
                );
                
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    throw new Error("ID de sucursal o PIN incorrectos.");
                }
                
                const userDoc = querySnapshot.docs[0];
                const userData = userDoc.data();
                
                if (userData.activo !== true) {
                    throw new Error("Acceso denegado. Usuario inactivo.");
                }
                
                // Save session
                localStorage.setItem('shift_sucursal', userData.sucursalId);
                localStorage.setItem('shift_role', userData.rol);
                localStorage.setItem('shift_session', 'active');
                
                // Redirect based on role
                if (userData.rol === 'boss') {
                    window.location.href = 'boss-dashboard.html';
                } else {
                    window.location.href = 'valet-terminal.html';
                }
            } catch (error) {
                errorBox.textContent = error.message;
                errorBox.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Verificar Credenciales';
            }
        });
    </script>
</body>
</html>
