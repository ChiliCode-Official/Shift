<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Prueba Gratis | Shift</title>
    
    <!-- Favicon / PWA Icon -->
    <link rel="icon" type="image/png" href="https://i.imgur.com/kLlDof4.png">
    
    <!-- Hojas de estilo -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        .register-card {
            width: 100%;
            max-width: 440px;
            padding: 40px 32px;
            text-align: center;
            animation: card-reveal 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes card-reveal {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-logo {
            height: 50px;
            margin-bottom: 20px;
            object-fit: contain;
        }

        .register-title {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #FFFFFF 40%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .register-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .error-message {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 16px;
            text-align: left;
            display: none;
            padding: 8px 12px;
            background: rgba(255, 94, 94, 0.1);
            border: 1px solid rgba(255, 94, 94, 0.2);
            border-radius: 8px;
        }

        .success-message {
            color: var(--primary);
            font-size: 0.85rem;
            margin-top: 16px;
            text-align: left;
            display: none;
            padding: 8px 12px;
            background: rgba(0, 200, 150, 0.1);
            border: 1px solid rgba(0, 200, 150, 0.2);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="glass-panel register-card">
        <img src="https://i.imgur.com/NQ2yinY.png" alt="Shift Logo" class="register-logo">
        <h1 class="register-title">Prueba Gratis (Piquín)</h1>
        <p class="register-subtitle">Activa tu sucursal al instante con tu número celular</p>

        <form id="register-form">
            <div class="form-group" style="text-align: left;">
                <label for="phone-input" class="form-label">Número Celular (10 dígitos)</label>
                <input type="tel" id="phone-input" class="form-control" placeholder="Ej. 5512345678" maxlength="10" inputmode="numeric" pattern="[0-9]{10}" required autocomplete="off">
                <span style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; display: block;">
                    Introduce los 10 dígitos de tu celular. Este número será tu identificador.
                </span>
            </div>

            <button type="submit" id="btn-submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">
                Activar Prueba Gratis
            </button>
        </form>

        <div id="error-box" class="error-message"></div>
        <div id="success-box" class="success-message"></div>
    </div>

    <!-- Firebase SDK & Script de Registro -->
    <script type="module">
        import { db } from "./firebase-config.js";
        import { 
            doc, 
            getDoc, 
            setDoc, 
            collection, 
            addDoc,
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const errorBox = document.getElementById("error-box");
        const successBox = document.getElementById("success-box");
        const submitBtn = document.getElementById("btn-submit");

        function showError(msg) {
            successBox.style.display = "none";
            errorBox.textContent = msg;
            errorBox.style.display = "block";
        }

        function showSuccess(msg) {
            errorBox.style.display = "none";
            successBox.textContent = msg;
            successBox.style.display = "block";
        }

        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            errorBox.style.display = "none";
            successBox.style.display = "none";

            const telefono = document.getElementById("phone-input").value.trim();
            
            // Validar formato (exactamente 10 dígitos numéricos)
            if (!/^\d{10}$/.test(telefono)) {
                showError("El número celular debe contener exactamente 10 dígitos numéricos.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Activando sucursal...";

            try {
                const sucursalId = `SUC-${telefono}`;

                // 1. Verificar si la sucursal ya existe
                const sucursalDocRef = doc(db, "sucursales", sucursalId);
                const sucursalSnap = await getDoc(sucursalDocRef);

                if (sucursalSnap.exists()) {
                    showError("Este número ya tiene una sucursal activa. Ve al panel de acceso.");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 3000);
                    return;
                }

                // 2. Crear documento de sucursal
                await setDoc(sucursalDocRef, {
                    plan: 'piquin',
                    createdAt: serverTimestamp(),
                    esSotano: false,
                    tarifaHora: 0,
                    telefono: telefono
                });

                // 3. Crear documento de usuario 'boss' asociado
                const usersCollectionRef = collection(db, "usuarios");
                await addDoc(usersCollectionRef, {
                    sucursalId: sucursalId,
                    rol: 'boss',
                    pin: '1234',
                    activo: true,
                    phone: telefono,
                    createdAt: serverTimestamp()
                });

                showSuccess("¡Bóveda creada exitosamente! Redirigiendo...");

                // Notificar al usuario y redirigir
                alert(`¡Bóveda creada!\n\nTu ID de Sucursal es: ${sucursalId}\nTu PIN de Boss es: 1234\n\nPor favor, guárdalos bien e inicia sesión.`);
                window.location.href = "login.html";

            } catch (error) {
                console.error("Error al registrar:", error);
                const detail = error.code ? ` (${error.code})` : `: ${error.message}`;
                showError("Ocurrió un error al activar tu prueba gratis" + detail);
                submitBtn.disabled = false;
                submitBtn.textContent = "Activar Prueba Gratis";
            }
        });
    </script>
</body>
</html>
